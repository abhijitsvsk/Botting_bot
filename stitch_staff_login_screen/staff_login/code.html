<style>
        body {
            background-color: #0E1217;
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 0;
            overflow: hidden;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.12);
            backdrop-filter: blur(20px);
            border-radius: 24px;
            width: 480px;
            height: 500px;
        }
        .blur-circle-emerald {
            width: 600px;
            height: 600px;
            background: #10B981;
            filter: blur(120px);
            opacity: 0.20;
            position: absolute;
            top: -150px;
            left: -150px;
            z-index: 0;
        }
        .blur-circle-indigo {
            width: 600px;
            height: 600px;
            background: #6366F1;
            filter: blur(120px);
            opacity: 0.15;
            position: absolute;
            bottom: -150px;
            right: -150px;
            z-index: 0;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .input-dark {
            background-color: #1A2030;
            border-color: #2D3748;
        }

            color: #9CA3AF;
            font-size: 12px;
            letter-spacing: 0.05em;
        }

<body class="flex items-center justify-center min-h-screen relative">
<!-- Background Decorative Elements -->
<div class="blur-circle-emerald"></div>
<div class="blur-circle-indigo"></div>
<main class="relative z-10 flex flex-col items-center gap-6">
<!-- Auth Card -->
<section class="glass-card flex flex-col items-center px-10 py-12 shadow-2xl">
<!-- Lock Icon -->
<div class="w-16 h-16 rounded-full border border-white/20 bg-white/5 flex items-center justify-center mb-6">
<span class="material-symbols-outlined text-white text-3xl" data-icon="lock">lock</span>
</div>
<!-- Typography Header -->
<div class="text-center mb-8">
<h1 class="text-[28px] font-bold text-white tracking-tight leading-tight">System Access</h1>
<p class="text-[14px] text-[#9CA3AF] mt-1">Restricted to authorized staff only</p>
</div>
<!-- Form -->
<form class="w-full flex flex-col gap-5">
<!-- Email Field -->
<div class="flex flex-col gap-1.5">
<label class="label-style uppercase font-semibold">Email Address</label>
<div class="relative">
<input class="w-full h-[52px] px-4 rounded-[12px] input-dark border text-white placeholder-[#4B5563] focus:ring-2 focus:ring-primary focus:outline-none transition-all duration-200" placeholder="manager@kinetic.io" type="email"/>
</div>
</div>
<!-- Password Field -->
<div class="flex flex-col gap-1.5">
<label class="label-style uppercase font-semibold">Password</label>
<div class="relative">
<input class="w-full h-[52px] px-4 pr-12 rounded-[12px] input-dark border text-white placeholder-[#4B5563] focus:ring-2 focus:ring-primary focus:outline-none transition-all duration-200" placeholder="••••••••" type="password"/>
<button class="absolute right-4 top-1/2 -translate-y-1/2 text-slate-400 hover:text-white transition-colors" type="button">
<span class="material-symbols-outlined" data-icon="visibility">visibility</span>
</button>
</div>
</div>
<!-- Submit Button -->
<button class="w-full h-[52px] rounded-[12px] mt-2 bg-gradient-to-r from-[#10B981] to-[#059669] hover:brightness-110 active:scale-[0.98] transition-all flex items-center justify-center gap-2 text-white font-bold" type="submit">
<span class="material-symbols-outlined text-sm" data-icon="lock" style="font-variation-settings: 'FILL' 1;">lock</span>
                    Sign In
                </button>
</form>
</section>
<!-- Footer Legend -->
<footer class="text-center">
<p class="text-[12px] text-[#9CA3AF] tracking-wide">Role-based access — Kitchen, Cashier, Manager, Owner</p>
</footer>
</main>
<!-- Visual Identity Background Texture -->
<div class="fixed inset-0 pointer-events-none opacity-[0.03] z-0">
